name: 24/7 Kashi Smart Stream

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante mein restart taaki session fresh rahe

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup System and Files
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg wget
        # Saari files download ho rahi hain
        wget https://github.com/${{ github.repository }}/releases/download/v1/morning_video.mp4
        wget https://github.com/${{ github.repository }}/releases/download/v1/ganga_aarti_video.mp4
        wget https://github.com/${{ github.repository }}/releases/download/v1/morning_audio.mp3
        wget https://github.com/${{ github.repository }}/releases/download/v1/afternoon_audio.mp3
        wget https://github.com/${{ github.repository }}/releases/download/v1/evening_aarti_audio.mp3
        wget https://github.com/${{ github.repository }}/releases/download/v1/night_audio.mp3

    - name: Run Intelligent Stream
      run: |
        # IST Time (UTC + 5:30) nikalne ka logic
        H=$(date -u -d "+5 hours 30 minutes" +%H)
        echo "Current IST Hour: $H"

        if [ $H -ge 3 ] && [ $H -lt 9 ]; then
          echo "Loop 1: Morning (3 AM - 9 AM)"
          V="morning_video.mp4" ; A="morning_audio.mp3"
        elif [ $H -ge 9 ] && [ $H -lt 14 ]; then
          echo "Loop 2: Mid-Day (9 AM - 2 PM)"
          V="morning_video.mp4" ; A="afternoon_audio.mp3"
        elif [ $H -ge 14 ] && [ $H -lt 18 ]; then
          echo "Loop 3: Afternoon (2 PM - 6 PM)"
          V="morning_video.mp4" ; A="afternoon_audio.mp3"
        elif [ $H -ge 18 ] && [ $H -lt 21 ]; then
          echo "Loop 4: Evening Aarti (6 PM - 9 PM)"
          V="ganga_aarti_video.mp4" ; A="evening_aarti_audio.mp3"
        else
          echo "Loop 5: Night (9 PM - 3 AM)"
          V="ganga_aarti_video.mp4" ; A="night_audio.mp3"
        fi

        ffmpeg -re -stream_loop -1 -i "$V" -i "$A" -map 0:v:0 -map 1:a:0 -c:v libx264 -preset veryfast -b:v 2500k -maxrate 2500k -bufsize 5000k -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 -shortest -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
