name: 24/7 Kashi Photo Stream

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' 

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup System and Files
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg wget
        # Yahan apni thumbnail image aur audio files download kar rahe hain
        wget https://github.com/${{ github.repository }}/raw/main/thumbnail.jpg
        wget https://github.com/${{ github.repository }}/releases/download/v1/morning_audio.mp3
        wget https://github.com/${{ github.repository }}/releases/download/v1/afternoon_audio.mp3
        wget https://github.com/${{ github.repository }}/releases/download/v1/evening_aarti_audio.mp3
        wget https://github.com/${{ github.repository }}/releases/download/v1/night_audio.mp3

    - name: Run Photo Stream
      run: |
        H=$(date -u -d "+5 hours 30 minutes" +%H)
        echo "Current IST Hour: $H"

        if [ $H -ge 3 ] && [ $H -lt 10 ]; then
          A="morning_audio.mp3"
        elif [ $H -ge 10 ] && [ $H -lt 18 ]; then
          A="afternoon_audio.mp3"
        elif [ $H -ge 18 ] && [ $H -lt 21 ]; then
          A="evening_aarti_audio.mp3"
        else
          A="night_audio.mp3"
        fi

        # Sirf Photo aur Audio ko mix karne ki stable command
        ffmpeg -re -loop 1 -i thumbnail.jpg -i "$A" -c:v libx264 -preset superfast -tune stillimage -b:v 1000k -maxrate 1000k -bufsize 2000k -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 -shortest -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
