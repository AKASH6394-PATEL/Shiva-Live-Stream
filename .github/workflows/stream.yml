name: 24/7 Kashi Photo Stream

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' 

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup System
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg wget

    - name: Prepare Audio
      run: |
        # Audio files download kar rahe hain (Check karein ki ye links kaam kar rahe hain)
        wget -O morning.mp3 https://github.com/${{ github.repository }}/releases/download/v1/morning_audio.mp3 || echo "Morning audio missing"
        wget -O afternoon.mp3 https://github.com/${{ github.repository }}/releases/download/v1/afternoon_audio.mp3 || echo "Afternoon audio missing"
        wget -O evening.mp3 https://github.com/${{ github.repository }}/releases/download/v1/evening_aarti_audio.mp3 || echo "Evening audio missing"
        wget -O night.mp3 https://github.com/${{ github.repository }}/releases/download/v1/night_audio.mp3 || echo "Night audio missing"

    - name: Run Photo Stream
      run: |
        # Timezone Calculation (IST)
        H=$(date -u -d "+5 hours 30 minutes" +%H)
        echo "Current IST Hour: $H"

        if [ $H -ge 03 ] && [ $H -lt 10 ]; then
          A="morning.mp3"
        elif [ $H -ge 10 ] && [ $H -lt 18 ]; then
          A="afternoon.mp3"
        elif [ $H -ge 18 ] && [ $H -lt 21 ]; then
          A="evening.mp3"
        else
          A="night.mp3"
        fi

        # Check if thumbnail exists
        if [ ! -f "thumbnail.jpg" ]; then
          echo "ERROR: thumbnail.jpg not found in repository root!"
          exit 1
        fi

        # Stream Command with Auto-Loop and 6-hour limit
        ffmpeg -re -loop 1 -i thumbnail.jpg -stream_loop -1 -i "$A" \
        -c:v libx264 -preset superfast -tune stillimage -b:v 1500k \
        -maxrate 1500k -bufsize 3000k -pix_fmt yuv420p -g 60 \
        -c:a aac -b:a 128k -ar 44100 \
        -t 21500 -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
